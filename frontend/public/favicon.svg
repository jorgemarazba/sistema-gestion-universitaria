<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 3D Shadow gradient -->
    <linearGradient id="shadow3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#172554"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    
    <!-- Main bolt gradient - 3D effect -->
    <linearGradient id="bolt3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="30%" style="stop-color:#60a5fa"/>
      <stop offset="60%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    
    <!-- Highlight gradient for top edge -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0"/>
    </linearGradient>
    
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.6"/>
    </filter>
    
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k2="1.2" k3="-0.2"/>
    </filter>
  </defs>
  
  <!-- 3D Shadow layer (offset) -->
  <path d="M46 4 L12 28 L26 28 L18 62 L56 22 L42 22 L52 4 Z" 
        fill="url(#shadow3d)" 
        opacity="0.7"/>
  
  <!-- Main 3D Bolt -->
  <path d="M44 2 L10 26 L24 26 L16 60 L54 20 L40 20 L50 2 Z" 
        fill="url(#bolt3d)" 
        stroke="#60a5fa" 
        stroke-width="2" 
        stroke-linejoin="round"
        filter="url(#dropShadow)"/>
  
  <!-- Top highlight for 3D effect -->
  <path d="M44 2 L10 26 L18 26 L44 4 Z" 
        fill="url(#highlight)" 
        opacity="0.9"/>
  
  <!-- Side highlight -->
  <path d="M54 20 L40 20 L16 60 L18 56 L42 22 L54 22 Z" 
        fill="#1d4ed8" 
        opacity="0.3"/>
</svg>